name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Official install method per https://docs.midnight.network/getting-started/installation
      - name: Install Compact toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/midnightntwrk/compact/releases/latest/download/compact-installer.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Pin Compact compiler version
        run: compact update 0.31.1

      - name: Install root + matcher workspace dependencies
        run: npm ci

      - name: Compile contract
        run: npm run compile

      - name: Typecheck (root)
        run: npm run build

      - name: Run contract test suite (root)
        run: npm run test

      - name: Typecheck (matcher)
        run: npm run typecheck --workspace=matcher

      - name: Lint (matcher)
        run: npm run lint --workspace=matcher

      - name: Run matcher test suite
        run: npm run test --workspace=matcher

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Typecheck (web)
        working-directory: web
        run: npm run typecheck

      - name: Lint (web)
        working-directory: web
        run: npm run lint

      - name: Run web test suite
        working-directory: web
        run: npm run test

      - name: Production build (web)
        working-directory: web
        run: npm run build
