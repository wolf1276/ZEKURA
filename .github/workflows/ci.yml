name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  COMPACT_VERSION: '0.31.1'

jobs:
  # Compiles both contracts once and shares the output with every downstream
  # job — root, matcher, and web all statically import types from
  # contracts/managed/exchange/contract/index.js, and the root test suite
  # (tests/tzkr-token.test.ts) also needs contracts/managed/tzkr-token/.
  compile-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Compact toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/midnightntwrk/compact/releases/latest/download/compact-installer.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Pin Compact compiler version
        run: compact update "$COMPACT_VERSION"

      - name: Compile exchange contract
        run: compact compile contracts/exchange.compact contracts/managed/exchange

      - name: Compile tZKR token contract
        run: compact compile contracts/tzkr-token.compact contracts/managed/tzkr-token

      - uses: actions/upload-artifact@v4
        with:
          name: compiled-contract
          path: |
            contracts/managed/exchange
            contracts/managed/tzkr-token
          retention-days: 1

  # Root package: typecheck + the hand-rolled contract test suite
  # (tests/exchange.test.ts), driven directly through @midnight-ntwrk/compact-runtime.
  contract-tests:
    needs: compile-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/download-artifact@v4
        with:
          name: compiled-contract
          path: contracts/managed

      - name: Install root + matcher workspace dependencies
        run: npm ci

      - name: Typecheck (root)
        run: npm run build

      - name: Run contract test suite (root)
        run: npm run test

  # Matcher: the confidential off-chain order book and settlement engine.
  matcher:
    needs: compile-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/download-artifact@v4
        with:
          name: compiled-contract
          path: contracts/managed

      - name: Install root + matcher workspace dependencies
        run: npm ci

      - name: Typecheck (matcher)
        run: npm run typecheck --workspace=matcher

      - name: Lint (matcher)
        run: npm run lint --workspace=matcher

      - name: Run matcher test suite
        run: npm run test --workspace=matcher

  # Web: the Next.js trading UI (standalone package, own lockfile).
  web:
    needs: compile-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/download-artifact@v4
        with:
          name: compiled-contract
          path: contracts/managed

      # The compiled contract at contracts/managed/exchange/contract/index.js lives
      # outside web/, so its own `import '@midnight-ntwrk/compact-runtime'` resolves
      # via root node_modules (Node/Turbopack walk up from the file's own directory),
      # not web/node_modules. Both installs are required.
      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Typecheck (web)
        working-directory: web
        run: npm run typecheck

      - name: Lint (web)
        working-directory: web
        run: npm run lint

      - name: Run web test suite
        working-directory: web
        run: npm run test

      - name: Production build (web)
        working-directory: web
        run: npm run build
